name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release for this tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhisperDesktop ${{ github.ref_name }}
          body: 语音/视频转文本桌面工具
          draft: true
          prerelease: false

  build-macos-arm64:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (arm64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resource (macOS arm64)
        run: |
          mkdir -p src-tauri/resources
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip?arch=arm64" -o /tmp/ffmpeg-mac-arm64.zip
          unzip -o /tmp/ffmpeg-mac-arm64.zip -d /tmp/ffmpeg-arm64
          cp /tmp/ffmpeg-arm64/ffmpeg src-tauri/resources/ffmpeg-macos-arm64
          chmod +x src-tauri/resources/ffmpeg-macos-arm64
          file src-tauri/resources/ffmpeg-macos-arm64 | grep "Mach-O 64-bit executable arm64"

      - name: Verify no local dylib deps (arm64 ffmpeg)
        run: |
          bash scripts/verify-macos-binary-deps.sh src-tauri/resources/ffmpeg-macos-arm64

      - name: Configure tauri resources for macOS arm64
        run: npm run prepare:bundle:mac

      - name: Build Tauri app (macOS arm64)
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS arm64 dmg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-macos-intel:
    needs: create-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (x64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resource (macOS x64)
        run: |
          mkdir -p src-tauri/resources
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip?arch=x86_64" -o /tmp/ffmpeg-mac-x64.zip
          unzip -o /tmp/ffmpeg-mac-x64.zip -d /tmp/ffmpeg-x64
          cp /tmp/ffmpeg-x64/ffmpeg src-tauri/resources/ffmpeg-macos-x64
          chmod +x src-tauri/resources/ffmpeg-macos-x64
          file src-tauri/resources/ffmpeg-macos-x64 | grep x86_64

      - name: Verify no local dylib deps (x64 ffmpeg)
        run: |
          bash scripts/verify-macos-binary-deps.sh src-tauri/resources/ffmpeg-macos-x64

      - name: Configure tauri resources for macOS x64
        run: npm run prepare:bundle:mac:intel

      - name: Build Tauri app (macOS x64)
        run: npm run tauri build -- --target x86_64-apple-darwin

      - name: Upload macOS x64 dmg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows-x64:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resources (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\\ffmpeg-win.zip"
          Expand-Archive -Path "$env:TEMP\\ffmpeg-win.zip" -DestinationPath "$env:TEMP\\ffmpeg-win" -Force
          $ffmpeg = Get-ChildItem -Path "$env:TEMP\\ffmpeg-win" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe not found" }
          Copy-Item $ffmpeg.FullName "src-tauri/resources/ffmpeg-windows-x64.exe" -Force
          $size = (Get-Item "src-tauri/resources/ffmpeg-windows-x64.exe").Length
          if ($size -lt 1000000) { throw "ffmpeg.exe size too small: $size" }

      - name: Validate Windows icon asset
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) { throw "src-tauri/icons/icon.ico not found" }
          $iconSize = (Get-Item "src-tauri/icons/icon.ico").Length
          if ($iconSize -lt 1000) { throw "icon.ico size too small: $iconSize" }

      - name: Configure tauri resources for Windows x64
        run: npm run prepare:bundle:win

      - name: Build Tauri app (Windows x64)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows x64 exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
