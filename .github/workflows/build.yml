name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release for this tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhisperDesktop ${{ github.ref_name }}
          body: WhisperDesktop desktop speech/video transcription tool.
          draft: true
          prerelease: false

  build-macos-arm64:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (arm64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resource (macOS arm64)
        run: |
          mkdir -p src-tauri/resources
          cp node_modules/ffmpeg-static/ffmpeg src-tauri/resources/ffmpeg-macos-arm64
          chmod +x src-tauri/resources/ffmpeg-macos-arm64
          file src-tauri/resources/ffmpeg-macos-arm64 | grep "Mach-O 64-bit executable arm64"

      - name: Verify no local dylib deps (arm64 ffmpeg)
        run: bash scripts/verify-macos-binary-deps.sh src-tauri/resources/ffmpeg-macos-arm64

      - name: Build Tauri app (macOS arm64)
        run: npm run build:mac:arm

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperDesktop-macos-arm64
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS arm64 dmg to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhisperDesktop ${{ github.ref_name }}
          body: WhisperDesktop desktop speech/video transcription tool.
          draft: true
          prerelease: false
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-macos-intel:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable (x64 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resource (macOS x64)
        run: |
          mkdir -p src-tauri/resources
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip?arch=x86_64" -o /tmp/ffmpeg-mac-x64.zip
          unzip -o /tmp/ffmpeg-mac-x64.zip -d /tmp/ffmpeg-x64
          cp /tmp/ffmpeg-x64/ffmpeg src-tauri/resources/ffmpeg-macos-x64
          chmod +x src-tauri/resources/ffmpeg-macos-x64
          file src-tauri/resources/ffmpeg-macos-x64 | grep x86_64

      - name: Verify no local dylib deps (x64 ffmpeg)
        run: bash scripts/verify-macos-binary-deps.sh src-tauri/resources/ffmpeg-macos-x64

      - name: Build Tauri app (macOS x64)
        run: npm run build:mac:intel

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperDesktop-macos-x64
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload macOS x64 dmg to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhisperDesktop ${{ github.ref_name }}
          body: WhisperDesktop desktop speech/video transcription tool.
          draft: true
          prerelease: false
          files: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows-x64:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Prepare ffmpeg resource (Windows x64)
        run: npm run prepare:ffmpeg:win

      - name: Validate Windows icon asset
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri/icons/icon.ico")) { throw "src-tauri/icons/icon.ico not found" }
          $iconSize = (Get-Item "src-tauri/icons/icon.ico").Length
          if ($iconSize -lt 1000) { throw "icon.ico size too small: $iconSize" }

      - name: Build Tauri app (Windows x64)
        run: npm run build:win

      - name: Upload Windows x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperDesktop-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Upload Windows x64 installer to draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WhisperDesktop ${{ github.ref_name }}
          body: WhisperDesktop desktop speech/video transcription tool.
          draft: true
          prerelease: false
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
