name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with both macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: npm install
      - name: Prepare ffmpeg resources (macOS universal)
        run: |
          brew install ffmpeg@6
          mkdir -p src-tauri/resources
          cp "$(brew --prefix ffmpeg@6)/bin/ffmpeg" src-tauri/resources/ffmpeg-macos-arm64
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip?arch=x86_64" -o /tmp/ffmpeg-mac-x64.zip
          unzip -o /tmp/ffmpeg-mac-x64.zip -d /tmp/ffmpeg-x64
          cp /tmp/ffmpeg-x64/ffmpeg src-tauri/resources/ffmpeg-macos-x64
          chmod +x src-tauri/resources/ffmpeg-macos-arm64 src-tauri/resources/ffmpeg-macos-x64
      - name: Configure tauri resources for macOS universal
        run: npm run prepare:bundle:mac:universal
      - name: Build Tauri app (Universal Binary)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WhisperDesktop ${{ github.ref_name }}'
          releaseBody: '语音/视频转文本桌面工具'
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: npm install
      - name: Prepare ffmpeg resources (Windows x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "$env:TEMP\\ffmpeg-win.zip"
          Expand-Archive -Path "$env:TEMP\\ffmpeg-win.zip" -DestinationPath "$env:TEMP\\ffmpeg-win" -Force
          $ffmpeg = Get-ChildItem -Path "$env:TEMP\\ffmpeg-win" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName "src-tauri/resources/ffmpeg-windows-x64.exe" -Force
      - name: Configure tauri resources for Windows x64
        run: npm run prepare:bundle:win
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WhisperDesktop ${{ github.ref_name }}'
          releaseBody: '语音/视频转文本桌面工具'
          releaseDraft: true
          prerelease: false
